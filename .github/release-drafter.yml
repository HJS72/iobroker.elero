name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Maintenance"
    labels:
      - "chore"
      - "ci"
      - "dependencies"

change-template: "- $TITLE (#$NUMBER)"
no-changes-template: "- No significant user-facing changes."
template: |
  ## Changes

  $CHANGES

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bug"
      - "chore"
      - "ci"
      - "dependencies"
  default: patch

autolabeler:
  - label: "feature"
    title:
      - "/feat/i"
  - label: "fix"
    title:
      - "/fix/i"
  - label: "chore"
    title:
      - "/chore/i"
  - label: "ci"
    title:
      - "/ci/i"
